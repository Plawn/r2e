[package]
name = "example-openfga"
version.workspace = true
edition.workspace = true
publish = false

[features]
dev-reload = ["r2e/dev-reload"]

[dependencies]
r2e = { workspace = true, features = ["openfga", "security", "openapi"] }
tokio = { workspace = true, features = ["full"] }
serde = { workspace = true }
serde_json = { workspace = true }
jsonwebtoken = { workspace = true }
tracing = { workspace = true }

[dev-dependencies]
r2e-test = { workspace = true }
r2e-devservices = { workspace = true, features = ["openfga"] }
tokio = { workspace = true, features = ["full"] }
serde_json = { workspace = true }
