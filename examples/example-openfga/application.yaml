app:
  name: "example-openfga"

# OpenFGA connection (`endpoint` is the gRPC port, 8081). The `OpenFga` plugin
# owns the store lifecycle at boot: it looks up the store by name (creating it
# when missing), applies `authz::MODEL` when it differs from the store's
# latest, and pins the resolved model id for all checks. No server-generated
# IDs to paste — just start OpenFGA (see docker-compose.yml) and `cargo run`.
#
# Production: set `apply_model: false` to fail startup on a model mismatch
# instead of writing (verify mode), and optionally pin an exact `model_id`.
openfga:
  endpoint: "http://localhost:8081"
  store: "documents"
