[package]
name = "r2e"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
keywords.workspace = true
categories.workspace = true
description = "Quarkus-like ergonomic layer over Axum — declarative controllers, compile-time DI, and zero runtime reflection"

[features]
default = ["security", "events", "utils"]
full = ["security", "events", "utils", "data", "data-sqlx", "scheduler", "cache", "rate-limit", "openapi", "oidc", "prometheus", "openfga", "observability", "ws", "multipart", "grpc", "static", "proxy"]
security = ["dep:r2e-security"]
events = ["dep:r2e-events"]
utils = ["dep:r2e-utils"]
data = ["dep:r2e-data"]
data-sqlx = ["data", "dep:r2e-data-sqlx"]
data-diesel = ["data", "dep:r2e-data-diesel"]
# Convenience pass-through features for sqlx database drivers
sqlite = ["data-sqlx", "r2e-data-sqlx/sqlite"]
postgres = ["data-sqlx", "r2e-data-sqlx/postgres"]
mysql = ["data-sqlx", "r2e-data-sqlx/mysql"]
events-iggy = ["events", "dep:r2e-events-iggy"]
events-kafka = ["events", "dep:r2e-events-kafka"]
events-pulsar = ["events", "dep:r2e-events-pulsar"]
events-rabbitmq = ["events", "dep:r2e-events-rabbitmq"]
scheduler = ["dep:r2e-scheduler"]
cache = ["dep:r2e-cache"]
rate-limit = ["dep:r2e-rate-limit"]
oidc = ["dep:r2e-oidc"]
openapi = ["dep:r2e-openapi"]
prometheus = ["dep:r2e-prometheus"]
openfga = ["dep:r2e-openfga"]
observability = ["dep:r2e-observability"]
grpc = ["dep:r2e-grpc"]
static = ["dep:r2e-static"]
ws = ["r2e-core/ws"]
multipart = ["r2e-core/multipart"]
proxy = ["r2e-core/proxy"]
# NOTE: dev-reload is intentionally NOT in `full` — never include in production builds
dev-reload = ["dep:r2e-devtools", "r2e-core/dev-reload"]

[dependencies]
r2e-core = {workspace = true}
r2e-macros = {workspace = true}
r2e-security = {workspace = true, optional = true}
r2e-events = {workspace = true, optional = true}
r2e-utils = {workspace = true, optional = true}
r2e-data = {workspace = true, optional = true}
r2e-data-sqlx = {workspace = true, optional = true}
r2e-data-diesel = {workspace = true, optional = true}
r2e-scheduler = {workspace = true, optional = true}
r2e-cache = {workspace = true, optional = true}
r2e-rate-limit = {workspace = true, optional = true}
r2e-oidc = {workspace = true, optional = true}
r2e-openapi = {workspace = true, optional = true}
r2e-prometheus = {workspace = true, optional = true}
r2e-openfga = {workspace = true, optional = true}
r2e-grpc = {workspace = true, optional = true}
r2e-static = {workspace = true, optional = true}
r2e-observability = {workspace = true, optional = true}
r2e-events-iggy = {workspace = true, optional = true}
r2e-events-kafka = {workspace = true, optional = true}
r2e-events-pulsar = {workspace = true, optional = true}
r2e-events-rabbitmq = {workspace = true, optional = true}
r2e-devtools = {workspace = true, optional = true}
