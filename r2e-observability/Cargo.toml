[package]
name = "r2e-observability"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
keywords = ["opentelemetry", "tracing", "observability", "distributed-tracing"]
categories = ["web-programming"]
description = "OpenTelemetry observability plugin for R2E — distributed tracing and context propagation"

[features]
default = ["otlp"]
otlp = ["opentelemetry-otlp"]

[dependencies]
r2e-core = {workspace = true}
opentelemetry = {workspace = true}
opentelemetry_sdk = {workspace = true, features = ["rt-tokio"]}
opentelemetry-otlp = {workspace = true, optional = true}
opentelemetry-semantic-conventions = {workspace = true}
tracing-opentelemetry = {workspace = true}
tracing = {workspace = true}
tracing-subscriber = {workspace = true, features = ["json", "registry"]}
tower = {workspace = true}
http = {workspace = true}
pin-project-lite = {workspace = true}
