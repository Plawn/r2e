[package]
name = "r2e-test"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
keywords = ["testing", "http-client", "jwt"]
categories = ["development-tools::testing"]
description = "Test utilities for R2E - TestApp HTTP client and TestJwt token generation"

[dependencies]
r2e-core = {workspace = true}
r2e-security = {workspace = true}
tower = {workspace = true, features = ["util"]}
http = {workspace = true}
http-body-util = {workspace = true}
bytes = {workspace = true}
jsonwebtoken = {workspace = true, features = ["rust_crypto"]}
serde = {workspace = true}
serde_json = {workspace = true}
tokio = {workspace = true, features = ["full"]}
form_urlencoded = {workspace = true}

[dev-dependencies]
base64 = {workspace = true}
