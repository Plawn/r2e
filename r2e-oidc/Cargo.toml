[package]
name = "r2e-oidc"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
keywords = ["oidc", "jwt", "authentication", "oauth2"]
categories = ["authentication", "web-programming"]
description = "Embedded OIDC server plugin for R2E - issue JWT tokens without an external identity provider"

[dependencies]
r2e-core = {workspace = true}
r2e-security = {workspace = true}
jsonwebtoken = {workspace = true, features = ["rust_crypto"]}
rsa = {workspace = true}
argon2 = {workspace = true}
password-hash = {workspace = true}
rand = {workspace = true}
base64 = {workspace = true}
serde = {workspace = true}
serde_json = {workspace = true}
tokio = {workspace = true, features = ["rt", "sync"]}
dashmap = {workspace = true}
tracing = {workspace = true}

[dev-dependencies]
tokio = {workspace = true, features = ["full"]}
r2e-test = {workspace = true}
tower = {workspace = true}
http-body-util = {workspace = true}
