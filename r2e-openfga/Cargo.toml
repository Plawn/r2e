[package]
name = "r2e-openfga"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
keywords = ["openfga", "authorization", "zanzibar", "fine-grained"]
categories = ["web-programming", "authentication"]
description = "OpenFGA fine-grained authorization for R2E - Zanzibar-style relationship-based access control"

[dependencies]
r2e-core = {workspace = true}
openfga-rs = {workspace = true}
tokio = {workspace = true, features = ["sync", "time"]}
dashmap = {workspace = true}
tracing = {workspace = true}
serde = {workspace = true}
serde_json = {workspace = true}
url = {workspace = true}

[dev-dependencies]
tokio = {workspace = true, features = ["macros", "rt-multi-thread"]}
