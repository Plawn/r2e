[package]
name = "r2e-http"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
keywords = ["http", "web", "axum", "framework"]
categories = ["web-programming::http-server"]
description = "HTTP abstraction layer for R2E - sole owner of the axum dependency"

[features]
default = []
ws = ["axum/ws"]
multipart = ["axum/multipart"]
quic = ["dep:quinn", "dep:h3", "dep:h3-quinn", "dep:rustls", "dep:rustls-pemfile", "dep:http-body", "dep:http-body-util", "dep:tower", "dep:tracing", "dep:tokio"]

[dependencies]
axum = {workspace = true}
bytes = {workspace = true}
http = {workspace = true}
quinn = {workspace = true, optional = true}
h3 = {workspace = true, optional = true}
h3-quinn = {workspace = true, optional = true}
rustls = {workspace = true, optional = true}
rustls-pemfile = {workspace = true, optional = true}
http-body = {workspace = true, optional = true}
http-body-util = {workspace = true, optional = true}
tower = {workspace = true, optional = true}
tracing = {workspace = true, optional = true}
tokio = {workspace = true, optional = true}

[dev-dependencies]
tokio = {workspace = true, features = ["full"]}
rcgen = {workspace = true}
tracing-subscriber = {workspace = true}
h3 = {workspace = true}
h3-quinn = {workspace = true}
quinn = {workspace = true}
rustls = {workspace = true}
http = {workspace = true}
http-body-util = {workspace = true}
tower = {workspace = true}
