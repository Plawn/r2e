[package]
name = "openfga-rs"
version = "0.1.0"
edition = "2021"
license = "MIT OR Apache-2.0"
description = "Rust SDK for OpenFGA"
repository = "https://github.com/liamwh/openfga-rs.git"
authors = ["Liam Woodleigh-Hardinge", "liam.woodleigh@gmail.com"]
include = [
    "/src",
    "**/**.rs",
    "LICENSE-APACHE",
    "LICENSE-MIT",
    "README.md",
    "!tmp/**",
    "/proto/**",
]
resolver = "2"

[dependencies]
tonic = { version = "~0.14", default-features = false, features = ["tls-ring", "tls-webpki-roots", "channel", "codegen"] }
tonic-prost = "~0.14"
prost = { version = "~0.14", features = ["std", "derive"] }
prost-types = "~0.14"
prost-wkt = "~0.7"
prost-wkt-types = "~0.7"
serde = { version = "~1.0", features = ["derive"] }

[build-dependencies]
tonic-build = { version = "~0.14" }
tonic-prost-build = "~0.14"
prost-wkt-build = "~0.7"

[workspace.lints.rust]
unsafe_code = "forbid"

[workspace.metadata.cyclonedx]
included_dependencies = "all"
