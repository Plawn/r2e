[package]
name = "r2e-grpc"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
keywords = ["grpc", "tonic", "web", "framework"]
categories = ["web-programming"]
description = "gRPC server support for R2E framework"

[features]
default = []
reflection = ["dep:tonic-reflection"]

[dependencies]
r2e-core = {workspace = true}
tonic = {workspace = true, features = ["codegen", "prost", "router", "server"]}
prost = {workspace = true}
tokio = {workspace = true, features = ["net", "rt"]}
hyper = {workspace = true, features = ["http2", "server"]}
hyper-util = {workspace = true, features = ["server-auto", "tokio"]}
tower = {workspace = true}
http = {workspace = true}
http-body = {workspace = true}
tracing = {workspace = true}
serde_json = {workspace = true}
bytes = {workspace = true}
futures-util = {workspace = true}
pin-project-lite = {workspace = true}
tokio-util = {workspace = true, features = ["rt"]}

tonic-reflection = {workspace = true, optional = true}

[dev-dependencies]
tokio = {workspace = true, features = ["full"]}
