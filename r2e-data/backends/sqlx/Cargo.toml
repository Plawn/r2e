[package]
name = "r2e-data-sqlx"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
keywords = ["database", "sql", "sqlx", "transaction"]
categories = ["database"]
description = "Cancellation-safe managed SQLx transactions for R2E"

[features]
default = []
sqlite = ["sqlx/sqlite"]
postgres = ["sqlx/postgres"]
mysql = ["sqlx/mysql"]

[dependencies]
r2e-core = {workspace = true}
sqlx = {workspace = true}

[dev-dependencies]
tokio = {workspace = true, features = ["macros", "rt-multi-thread"]}
